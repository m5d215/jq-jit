name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install jq 1.8.1 (for differential tests)
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   asset=jq-linux-amd64 ;;
            Linux-ARM64) asset=jq-linux-arm64 ;;
            macOS-X64)   asset=jq-macos-amd64 ;;
            macOS-ARM64) asset=jq-macos-arm64 ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          curl -L -o /tmp/jq "https://github.com/jqlang/jq/releases/download/jq-1.8.1/${asset}"
          sudo install -m 0755 /tmp/jq /usr/local/bin/jq
          jq --version | grep -q '^jq-1\.8\.'

      - name: Build
        run: cargo build --release

      - name: Run tests
        # `--test-threads=1` serialises the per-binary test functions. The
        # cranelift-backed unit tests in `src/jit.rs` instantiate a fresh
        # `JitCompiler` each and have surfaced intermittent SIGSEGV on both
        # Linux and macOS runners when run in parallel. Mirrors ci.yml.
        run: cargo test --release -- --test-threads=1

      - name: Package
        run: |
          staging="jq-jit-${{ matrix.target }}"
          mkdir -p "$staging"
          cp target/release/jq-jit "$staging/"
          cp LICENSE-MIT LICENSE-APACHE THIRD-PARTY-LICENSES.md README.md "$staging/"
          tar czf "${staging}.tar.gz" -C "$staging" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: jq-jit-${{ matrix.target }}
          path: jq-jit-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" --generate-notes jq-jit-*.tar.gz

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: m5d215/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Bump formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          formula="Formula/jq-jit.rb"

          sed -i -E "s|version \"[^\"]+\"|version \"${version}\"|" "$formula"

          # 各プラットフォームの url 行と直後の sha256 行をペアで更新。
          # sed の N で次行を pattern space に追加してから一括置換する。
          for target in macos-arm64 linux-x86_64; do
            sha=$(shasum -a 256 "../jq-jit-${target}.tar.gz" | cut -d' ' -f1)
            sed -i -E "/-${target}\.tar\.gz\"$/{
              N
              s|download/v[0-9.]+/|download/${TAG}/|
              s|sha256 \"[a-f0-9]+\"|sha256 \"${sha}\"|
            }" "$formula"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          if git diff --cached --quiet; then
            echo "formula already at ${TAG}; skipping commit"
            exit 0
          fi
          git commit -m "jq-jit: bump to ${TAG}"
          git push

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get remove -y jq libjq1 libjq-dev 2>/dev/null || true
          sudo apt-get install -y libonig-dev autoconf automake libtool
          git clone --depth 1 --branch jq-1.8.1 https://github.com/jqlang/jq.git /tmp/jq
          cd /tmp/jq
          git submodule update --init
          autoreconf -i
          ./configure --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu --disable-docs
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq oniguruma

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release -- --test-threads=1

      - name: Package
        run: |
          cd target/release
          tar czf ../../jq-jit-${{ matrix.target }}.tar.gz jq-jit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jq-jit-${{ matrix.target }}
          path: jq-jit-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create ${{ github.ref_name }} --generate-notes jq-jit-*.tar.gz

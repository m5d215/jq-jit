name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get remove -y jq libjq1 libjq-dev 2>/dev/null || true
          sudo apt-get install -y libonig-dev autoconf automake libtool
          git clone --depth 1 --branch jq-1.8.1 https://github.com/jqlang/jq.git /tmp/jq
          cd /tmp/jq
          git submodule update --init
          autoreconf -i
          ./configure --prefix=/usr --libdir=/usr/lib/x86_64-linux-gnu --disable-docs
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq oniguruma

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release -- --test-threads=1

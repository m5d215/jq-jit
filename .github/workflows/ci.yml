name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libjq-dev libonig-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq oniguruma

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

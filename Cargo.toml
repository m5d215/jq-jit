[package]
name = "jq-jit"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
cranelift-codegen = "0.129"
cranelift-frontend = "0.129"
cranelift-jit = "0.129"
cranelift-module = "0.129"
cranelift-native = "0.129"
cranelift-object = "0.129"
anyhow = "1"
regex = "1"
libm = "0.2"
libc = "0.2"
serde_json = "1"

[lib]
crate-type = ["lib", "staticlib"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[build-dependencies]
bindgen = "0.71"

[[bin]]
name = "jq-jit"
path = "src/bin/jq-jit.rs"

[[bin]]
name = "jq-jit-test"
path = "src/main.rs"

[[bench]]
name = "jq_jit_bench"
harness = false
